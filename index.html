<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Gallery</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Responsive Image Gallery</h1>

<div class="filter-buttons">
<button onclick="filterSelection('all')">All</button>
<button onclick="filterSelection('nature')">Nature</button>
<button onclick="filterSelection('city')">City</button>
<button onclick="filterSelection('animals')">Animals</button>
</div>

<div class="gallery">

<div class="gallery-item nature">
<img src="nature1.png" onclick="openLightbox(0)">
</div>

<div class="gallery-item city">
<img src="city1.png" onclick="openLightbox(1)">
</div>

<div class="gallery-item animals">
<img src="animal1.png" onclick="openLightbox(2)">
</div>

<div class="gallery-item nature">
<img src="nature2.png" onclick="openLightbox(3)">
</div>

<div class="gallery-item city">
<img src="city2.png" onclick="openLightbox(4)">
</div>

<div class="gallery-item animals">
<img src="image.png" onclick="openLightbox(5)">
</div>

</div>

<div id="lightbox">

<span class="close" onclick="closeLightbox()">&times;</span>

<button class="prev" onclick="changeImage(-1)">&#10094;</button>

<img id="lightbox-image">

<button class="next" onclick="changeImage(1)">&#10095;</button>

</div>

<script src="script.js"></script>

</body>
</html>
